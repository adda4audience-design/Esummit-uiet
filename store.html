<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MERCH STORE | E-SUMMIT '26</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700;900&family=Courier+New:wght@400;700&display=swap');

        :root {
            --bg-black: #00030a;
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
            --primary-orange: #ff3300;
            --primary-red: #ff1100;
            --primary-gold: #ffaa00;
            --neon-blue: #00f0ff;
            --surface-color: rgba(10, 15, 25, 0.85);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-black);
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(255, 170, 0, 0.05), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(0, 240, 255, 0.05), transparent 25%);
            color: var(--text-main); font-family: 'Montserrat', sans-serif;
            overflow-x: hidden; min-height: 100vh;
        }

        /* --- Navigation --- */
        .nav-header {
            position: fixed; top: 0; width: 100%; padding: 1.2rem 5%;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 100; background: rgba(0, 3, 10, 0.9); backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 170, 0, 0.2);
        }
        .logo { font-size: 1rem; font-weight: 900; color: var(--text-main); text-decoration: none; letter-spacing: 2px; }
        .back-btn { color: var(--primary-gold); text-decoration: none; font-size: 0.8rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; transition: 0.3s; }
        .back-btn:hover { color: var(--text-main); text-shadow: 0 0 10px var(--primary-gold); }

        /* --- Store Layout --- */
        .store-header { margin-top: 120px; text-align: center; margin-bottom: 3rem; padding: 0 15px; }
        .store-header h1 {
            font-size: clamp(2rem, 5vw, 4rem); font-weight: 900; letter-spacing: 4px;
            color: var(--text-main); text-transform: uppercase;
            text-shadow: 0 0 15px rgba(255, 170, 0, 0.3);
        }
        .store-header p { color: var(--primary-gold); font-family: 'Courier New', monospace; letter-spacing: 2px; margin-top: 10px; font-size: 0.85rem;}

        .products-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 3rem; max-width: 1200px; margin: 0 auto 60px auto; padding: 0 5%;
        }

        /* --- Product Cards --- */
        .product-card {
            background: var(--surface-color); border: 1px solid rgba(255, 170, 0, 0.2);
            border-radius: 8px; overflow: hidden; backdrop-filter: blur(10px);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer; position: relative; display: flex; flex-direction: column;
        }
        .product-card:hover {
            transform: translateY(-10px); border-color: var(--primary-gold);
            box-shadow: 0 15px 30px rgba(255, 170, 0, 0.15), inset 0 0 20px rgba(255, 170, 0, 0.05);
        }
        .product-card::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 4px;
            background: var(--primary-gold); transform: scaleX(0); transform-origin: left; transition: 0.4s; z-index: 2;
        }
        .product-card:hover::before { transform: scaleX(1); }

        .img-container { height: 350px; overflow: hidden; position: relative; background: #050812; width: 100%; }
        .img-container img {
            width: 100%; height: 100%; object-fit: cover; filter: grayscale(40%) contrast(1.2); transition: 0.5s;
        }
        .product-card:hover .img-container img { filter: grayscale(0%) contrast(1.1) scale(1.05); }
        
        .card-details { padding: 1.5rem; text-align: center; flex: 1; display: flex; flex-direction: column; justify-content: center; }
        .card-details h3 { color: var(--neon-blue); font-size: 1.5rem; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 0.5rem; }
        .card-details p { color: var(--text-muted); font-size: 0.85rem; letter-spacing: 1px; }
        .price-tag { color: var(--primary-gold); font-size: 1.3rem; font-weight: 900; margin-top: 10px; font-family: 'Courier New', monospace; text-shadow: 0 0 10px rgba(255, 51, 0, 0.3); }

        /* --- Product Detail Modal --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0, 2, 5, 0.95); backdrop-filter: blur(15px);
            z-index: 1000; display: none; justify-content: center; align-items: center;
            opacity: 0; transition: opacity 0.4s ease; padding: 20px;
        }
        .modal-overlay.active { display: flex; opacity: 1; }
        
        .modal-content {
            background: var(--surface-color); width: 100%; max-width: 1000px;
            border: 1px solid var(--neon-blue); border-radius: 12px;
            display: flex; flex-wrap: wrap; position: relative; overflow: hidden;
            box-shadow: 0 0 50px rgba(0, 240, 255, 0.1); max-height: 90vh;
        }
        
        .close-modal {
            position: absolute; top: 20px; right: 20px; font-size: 2rem; color: var(--text-muted);
            cursor: pointer; z-index: 20; transition: 0.3s;
        }
        .close-modal:hover { color: var(--primary-red); transform: rotate(90deg); }

        /* Modal Left: Galleries */
        .modal-left { flex: 1; min-width: 300px; padding: 2rem; border-right: 1px solid rgba(255,255,255,0.1); display: flex; flex-direction: column; gap: 15px; overflow-y: auto; }
        .main-image { width: 100%; height: 400px; border-radius: 8px; object-fit: cover; border: 1px solid rgba(0, 240, 255, 0.3); }
        .thumbnail-strip { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 5px; -webkit-overflow-scrolling: touch; }
        .thumb { flex-shrink: 0; width: 80px; height: 80px; border-radius: 4px; object-fit: cover; cursor: pointer; border: 1px solid transparent; opacity: 0.6; transition: 0.3s; }
        .thumb.active, .thumb:hover { opacity: 1; border-color: var(--neon-blue); box-shadow: 0 0 10px rgba(0, 240, 255, 0.4); }

        /* Modal Right: Form & Specs */
        .modal-right { flex: 1; min-width: 300px; padding: 3rem 2rem; display: flex; flex-direction: column; justify-content: center; overflow-y: auto; }
        .modal-right h2 { font-size: 2.2rem; color: var(--text-main); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 2px; }
        .sys-tag { font-family: 'Courier New', monospace; color: var(--primary-gold); font-size: 0.9rem; margin-bottom: 10px; display: block; }
        .modal-price { font-size: 2.2rem; color: var(--primary-gold); font-weight: 900; font-family: 'Courier New', monospace; display: block; margin-bottom: 2rem; text-shadow: 0 0 15px rgba(225, 255, 0, 0.4); }
        
        .form-group { margin-bottom: 1.5rem; display: none; }
        .form-group label { display: block; color: var(--text-muted); font-size: 0.8rem; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px; }
        
        .selector-grid { display: flex; gap: 10px; flex-wrap: wrap; }
        .select-btn {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2);
            color: var(--text-main); padding: 10px 20px; cursor: pointer; border-radius: 4px;
            font-family: 'Montserrat', sans-serif; font-weight: 700; transition: 0.3s; flex: 1 1 auto; text-align: center;
        }
        .select-btn:hover, .select-btn.selected {
            background: rgba(255, 170, 0, 0.2); border-color: var(--primary-gold); color: var(--primary-gold);
        }

        .action-btn {
            background: var(--primary-gold); color: var(--bg-black); border: none;
            padding: 18px; width: 100%; font-size: 1rem; font-weight: 900; letter-spacing: 3px;
            text-transform: uppercase; border-radius: 4px; cursor: pointer; transition: 0.3s;
            margin-top: 1rem; display: flex; justify-content: center; align-items: center; gap: 10px;
        }
        .action-btn:hover { background: #fff; box-shadow: 0 0 20px rgba(255, 255, 255, 0.5); }
        .action-btn:disabled { background: #333; color: #666; cursor: not-allowed; box-shadow: none; }
        
        .payment-note { text-align: center; font-size: 0.75rem; color: var(--text-muted); margin-top: 15px; font-family: 'Courier New', monospace; }

        /* --- MOBILE RESPONSIVENESS HIERARCHY --- */
        @media (max-width: 768px) {
            .store-header { margin-top: 90px; margin-bottom: 2rem; }
            .products-grid { grid-template-columns: 1fr; gap: 2rem; padding: 0; }
            .product-card { max-width: 400px; margin: 0 auto; width: 100%; }
            .img-container { height: 300px; }
            
            .modal-overlay { padding: 10px; align-items: flex-start; }
            .modal-content { flex-direction: column; border-width: 1px; max-height: calc(100vh - 20px); }
            
            .close-modal { 
                top: 15px; right: 15px; font-size: 1.5rem; 
                background: rgba(0,0,0,0.6); width: 40px; height: 40px; 
                display: flex; align-items: center; justify-content: center; 
                border-radius: 50%; border: 1px solid rgba(255,255,255,0.2);
            }
            
            .modal-left { border-right: none; border-bottom: 1px solid rgba(255,255,255,0.1); padding: 1.5rem 1rem 1rem 1rem; }
            .main-image { height: 280px; }
            .thumb { width: 65px; height: 65px; }
            
            .modal-right { padding: 1.5rem 1rem; }
            .modal-right h2 { font-size: 1.6rem; }
            .modal-price { font-size: 1.8rem; margin-bottom: 1.5rem; }
            
            .select-btn { padding: 10px; font-size: 0.85rem; }
            .action-btn { padding: 15px; font-size: 0.9rem; }
        }
    </style>
</head>
<body>

    <header class="nav-header">
        <a href="index.html" class="logo">E-SUMMIT 26'</a>
        <a href="index.html" class="back-btn"><i class="fa-solid fa-angle-left"></i> BACK</a>
    </header>

    <div class="store-header">
        <h1>Merch Hub</h1>
        <p>// SECURE YOUR PROTOCOL GEAR //</p>
    </div>

    <div class="products-grid">
        <!-- Bag -->
        <div class="product-card" onclick="openModal('Bag')">
            <div class="img-container">
                <img src="https://res.cloudinary.com/di10wvjn8/image/upload/v1784465912/Black_school_bag_E-SUMMIT_UIET_202607191624_ettede.jpg" alt="E-Summit Bag">
            </div>
            <div class="card-details">
                <h3>E-Summit Bag</h3>
                <p>Official Bag for E-Summit</p>
                <p class="price-tag">₹449</p>
            </div>
        </div>

        <!-- Cap -->
        <div class="product-card" onclick="openModal('Cap')">
            <div class="img-container">
                <img src="https://res.cloudinary.com/di10wvjn8/image/upload/v1784466260/Black_baseball_cap_E-SUMMIT_UIET__202607191834_gesuye.jpg" alt="E-Summit Cap">
            </div>
            <div class="card-details">
                <h3>E-Summit Cap</h3>
                <p>Cool E-Summit Caps</p>
                <p class="price-tag">₹249</p>
            </div>
        </div>

        <!-- T-Shirt -->
        <div class="product-card" onclick="openModal('T-Shirt')">
            <div class="img-container">
                <img src="https://res.cloudinary.com/di10wvjn8/image/upload/v1784465875/Black_T-shirt_mockup_E-SUMMIT_UI__202607191636_qqujav.jpg" alt="E-Summit T-Shirt">
            </div>
            <div class="card-details">
                <h3>Printed T-Shirt</h3>
                <p>Customized with Name</p>
                <p class="price-tag">₹349</p>
            </div>
        </div>
    </div>

    <!-- Interactive Modal -->
    <div class="modal-overlay" id="productModal">
        <div class="modal-content">
            <i class="fa-solid fa-xmark close-modal" onclick="closeModal()"></i>
            
            <div class="modal-left">
                <img src="" alt="Main Product Image" class="main-image" id="modalMainImg">
                <div class="thumbnail-strip" id="modalThumbnails">
                    <!-- Thumbnails injected via JS -->
                </div>
            </div>
            
            <div class="modal-right">
                <h2 id="modalTitle">Product Name</h2>
                <span class="sys-tag" id="modalTag">// CLASSIFIED ASSET //</span>
                <span class="modal-price" id="modalPrice">₹000</span>
                
                <!-- Variant Selector (For Caps) -->
                <div class="form-group" id="variantGroup">
                    <label>Select Variant:</label>
                    <div class="selector-grid" id="variantSelector">
                        <!-- Buttons injected via JS -->
                    </div>
                </div>

                <!-- Size Selector (For T-Shirts) -->
                <div class="form-group" id="sizeGroup">
                    <label>Select Size:</label>
                    <div class="selector-grid" id="sizeSelector">
                        <button class="select-btn" onclick="selectOption('size', 'S')">S</button>
                        <button class="select-btn" onclick="selectOption('size', 'M')">M</button>
                        <button class="select-btn" onclick="selectOption('size', 'L')">L</button>
                        <button class="select-btn" onclick="selectOption('size', 'XL')">XL</button>
                    </div>
                </div>

                <button class="action-btn" id="orderBtn" onclick="placeOrder()">
                    <i class="fa-solid fa-cart-arrow-down"></i> Place Order
                </button>
                <p class="payment-note">PAYMENT MODE : COD only /-</p>
            </div>
        </div>
    </div>

    <script>
        // Data Structure matching your requested requirements
        const productData = {
            'Bag': {
                title: 'E-Summit Back-Pack',
                tag: '// HEAVY CARRY PROTOCOL //',
                price: '₹449',
                images: [
                    'https://res.cloudinary.com/di10wvjn8/image/upload/v1784465912/Black_school_bag_E-SUMMIT_UIET_202607191624_ettede.jpg',
                    'https://res.cloudinary.com/di10wvjn8/image/upload/v1784465901/Black_school_bag_E-SUMMIT_UIET_202607191624_1_o77bjp.jpg',
                    'https://res.cloudinary.com/di10wvjn8/image/upload/v1784466013/Black_school_bag_E-SUMMIT_UIET_202607191830_tt4rbp.jpg',
                    'https://res.cloudinary.com/di10wvjn8/image/upload/v1784465912/Black_school_bag_E-SUMMIT_UIET_202607191624_ettede.jpg'
                ],
                needsVariant: false,
                needsSize: false
            },
            'Cap': {
                title: 'E-Summit Cap',
                tag: '// HEADGEAR UPLINK //',
                price: '₹249',
                variants: ['Classic Black', 'Standout Grey', 'Deadly Blue', 'Charming White'],
                images: [
                    'https://res.cloudinary.com/di10wvjn8/image/upload/v1784466260/Black_baseball_cap_E-SUMMIT_UIET__202607191834_gesuye.jpg',
                    'https://res.cloudinary.com/di10wvjn8/image/upload/v1784465890/Baseball_cap_mockup_with_logo_202607191635_of5sh7.jpg',
                    'https://res.cloudinary.com/di10wvjn8/image/upload/v1784466003/Navy_blue_baseball_cap_mockup_202607191829_qaokeg.jpg',
                    'https://res.cloudinary.com/di10wvjn8/image/upload/v1784465875/Baseball_cap_with_E-SUMMIT_UIET_202607191635_goekbk.jpg'
                ],
                needsVariant: true,
                needsSize: false
            },
            'T-Shirt': {
                title: 'E-Summit T-Shirt',
                tag: '// UNIFORM STANDARD //',
                price: '₹349',
                images: [
                    'https://res.cloudinary.com/di10wvjn8/image/upload/v1784465875/Black_T-shirt_mockup_E-SUMMIT_UI__202607191636_qqujav.jpg',
                    'https://res.cloudinary.com/di10wvjn8/image/upload/v1784465875/Black_T-shirt_with_E-SUMMIT_UIET__202607191636_yu6k5l.jpg'
                ],
                needsVariant: false,
                needsSize: true
            }
        };

        let currentItem = null;
        let selectedVariant = null;
        let selectedSize = null;

        function openModal(itemType) {
            currentItem = itemType;
            const data = productData[itemType];
            
            // Reset selections
            selectedVariant = null;
            selectedSize = null;
            document.querySelectorAll('.select-btn').forEach(btn => btn.classList.remove('selected'));

            // Set Texts
            document.getElementById('modalTitle').innerText = data.title;
            document.getElementById('modalTag').innerText = data.tag;
            document.getElementById('modalPrice').innerText = data.price;
            
            // Setup Images
            document.getElementById('modalMainImg').src = data.images[0];
            const thumbContainer = document.getElementById('modalThumbnails');
            thumbContainer.innerHTML = '';
            
            data.images.forEach((imgSrc, index) => {
                const img = document.createElement('img');
                img.src = imgSrc;
                img.className = `thumb ${index === 0 ? 'active' : ''}`;
                img.onclick = () => setMainImage(imgSrc, img, itemType, index);
                thumbContainer.appendChild(img);
            });

            // Setup Form Display
            document.getElementById('variantGroup').style.display = data.needsVariant ? 'block' : 'none';
            document.getElementById('sizeGroup').style.display = data.needsSize ? 'block' : 'none';

            // Populate Variants for Caps dynamically
            if (data.needsVariant) {
                const varContainer = document.getElementById('variantSelector');
                varContainer.innerHTML = '';
                data.variants.forEach((variantName, index) => {
                    const btn = document.createElement('button');
                    btn.className = 'select-btn';
                    btn.innerText = variantName;
                    btn.onclick = () => {
                        selectOption('variant', variantName);
                        // Auto switch image to match variant
                        setMainImage(data.images[index], thumbContainer.children[index], itemType, index);
                    };
                    varContainer.appendChild(btn);
                });
            }

            document.getElementById('productModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('productModal').classList.remove('active');
        }

        function setMainImage(src, thumbElem, itemType, index) {
            document.getElementById('modalMainImg').src = src;
            document.querySelectorAll('.thumb').forEach(t => t.classList.remove('active'));
            thumbElem.classList.add('active');
            
            // If selecting a Cap image, auto-select the matching variant
            if (itemType === 'Cap' && productData['Cap'].variants[index]) {
                selectOption('variant', productData['Cap'].variants[index]);
            }
        }

        function selectOption(type, value) {
            if (type === 'size') {
                selectedSize = value;
                const buttons = document.getElementById('sizeSelector').children;
                Array.from(buttons).forEach(btn => btn.classList.remove('selected'));
            } else if (type === 'variant') {
                selectedVariant = value;
                const buttons = document.getElementById('variantSelector').children;
                Array.from(buttons).forEach(btn => btn.classList.remove('selected'));
            }
            event.target.classList.add('selected');
        }

        async function placeOrder() {
            const data = productData[currentItem];
            
            // Validation
            if (data.needsSize && !selectedSize) {
                alert('ERROR: Please select a size configuration.');
                return;
            }
            if (data.needsVariant && !selectedVariant) {
                alert('ERROR: Please select a variant configuration.');
                return;
            }

            const token = localStorage.getItem('esummit_token');
            if (!token) {
                alert('Please Login on Home page, to place the Order');
                window.location.href = "register.html";
                return;
            }

            const btn = document.getElementById('orderBtn');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> TRANSMITTING...';
            btn.disabled = true;

            const payload = {
                itemType: currentItem, 
                variant: selectedVariant || undefined,
                size: selectedSize || undefined,
            };

            try {
                const response = await fetch("https://esummit-backend-gonf.onrender.com/api/goodies/order",  {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}` 
                    },
                    body: JSON.stringify(payload)
                });

                const result = await response.json();

                if (result.success) {
                    btn.innerHTML = '<i class="fa-solid fa-check"></i> ORDER SECURED';
                    btn.style.backgroundColor = '#00ff66';
                    btn.style.color = '#000';
                    setTimeout(() => {
                        closeModal();
                        btn.innerHTML = originalText;
                        btn.style = '';
                        btn.disabled = false;
                    }, 2000);
                } else {
                    alert(result.error || 'Transmission Failed.');
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                }
            } catch (error) {
                alert("Network disruption. Please try again.");
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
